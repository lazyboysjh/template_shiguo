<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>十国千娇 · 封面</title>
  <style>
    :root {
      --accent: #b8926a;
      --accent-soft: rgba(184, 146, 106, 0.14);
      --accent-glow: rgba(184, 146, 106, 0.35);
      --bg-1: #0a0a0c;
      --bg-2: #121216;
      --panel: rgba(22, 22, 26, 0.72);
      --panel-2: rgba(32, 32, 38, 0.55);
      --border: rgba(255, 255, 255, 0.06);
      --border-active: rgba(184, 146, 106, 0.32);
      --text: #ece8e2;
      --text-soft: #a8a29c;
      --text-dim: #7a756e;
      --shadow: 0 20px 48px rgba(0, 0, 0, 0.55);
      --shadow-glow: 0 0 28px rgba(184, 146, 106, 0.12);
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --sg-bg: var(--bg-1);
      --sg-accent: var(--accent);
      --sg-accent-dim: var(--accent-soft);
      --sg-panel: var(--panel);
      --sg-panel-light: rgba(255, 255, 255, 0.035);
      --sg-border: var(--border-active);
      --sg-text: var(--text);
      --sg-soft: var(--text-soft);
      --sg-gold: #d4b896;
      --sg-danger: #a06060;
      --bg-img: url('https://testingcf.jsdelivr.net/gh/lazyboysjh/image@main/20260605013906916.png');
      --shell-bg: linear-gradient(145deg, rgba(14,14,17,0.86), rgba(5,5,8,0.94)), var(--bg-img) center/cover no-repeat fixed;
      --shell-border: rgba(255,255,255,0.06);
      --shell-shadow: 0 24px 54px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.05);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.25, 0.64, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Serif SC", serif;
      background: #050508;
      color: var(--text);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    .sg-ambient {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        linear-gradient(145deg, rgba(15,15,18,0.82), rgba(5,5,8,0.94)),
        var(--bg-img) center/cover no-repeat fixed,
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(184,146,106,0.09), transparent 55%),
        radial-gradient(ellipse 40% 30% at 100% 80%, rgba(80,40,30,0.06), transparent 50%),
        radial-gradient(ellipse 35% 25% at 0% 60%, rgba(60,50,80,0.05), transparent 45%);
    }
    .sg-ambient::after {
      content: ""; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      opacity: 0.5;
    }
    .sg-scroll {
      overflow-y: auto; overflow-x: hidden;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: rgba(184,146,106,0.32) transparent;
    }
    .sg-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
    .sg-scroll::-webkit-scrollbar-track { background: transparent; margin: 4px 0; }
    .sg-scroll::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(184,146,106,0.15), rgba(184,146,106,0.35));
      border-radius: 999px; border: 1px solid rgba(184,146,106,0.08);
    }
    .sg-scroll::-webkit-scrollbar-thumb:hover { background: rgba(184,146,106,0.5); }
    .sg-x-scroll {
      scrollbar-width: thin;
      scrollbar-color: rgba(212,184,150,0.55) rgba(255,255,255,0.06);
    }
    .sg-x-scroll::-webkit-scrollbar { height: 8px; }
    .sg-x-scroll::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      margin: 0 4px;
    }
    .sg-x-scroll::-webkit-scrollbar-thumb {
      background: linear-gradient(90deg, rgba(184,146,106,0.42), rgba(212,184,150,0.72));
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.18);
    }
    .sg-app {
      position: relative; z-index: 1;
      height: 100dvh; max-height: 100dvh;
      max-width: 1360px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    @media (min-width: 768px) { .sg-app { padding: 0 24px; } }
    .sg-header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 4px 12px;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.35s ease, padding 0.35s ease;
    }
    .sg-header.is-home { border-bottom-color: transparent; margin-bottom: 8px; }
    .sg-header .sg-steps { transition: opacity 0.4s var(--ease-out), transform 0.4s var(--ease-out); }
    .sg-logo { font-size: 1.35rem; letter-spacing: 0.35em; color: var(--sg-gold); font-weight: 600; white-space: nowrap; }
    .sg-steps { display: flex; gap: 8px; font-size: 0.78rem; color: var(--sg-soft); }
    .sg-step { padding: 4px 12px; border-radius: 999px; border: 1px solid transparent; }
    .sg-step.is-active { border-color: var(--sg-accent); color: var(--sg-gold); background: var(--sg-accent-dim); }
    .sg-step.is-done { color: var(--sg-accent); }
    .sg-header-tools {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .sg-page {
      display: none; flex: 1; min-height: 0;
      flex-direction: column;
      pointer-events: none;
      overflow: hidden;
    }
    .sg-page.is-active {
      display: flex;
      pointer-events: auto;
    }
    .sg-page-shell {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: linear-gradient(165deg, rgba(20,20,24,0.88), rgba(12,12,14,0.94));
      backdrop-filter: blur(20px) saturate(1.15);
      -webkit-backdrop-filter: blur(20px) saturate(1.15);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
      overflow: hidden;
      animation: sgShellIn 0.5s var(--ease-out) both;
    }
    @keyframes sgShellIn {
      from { opacity: 0; transform: scale(0.985); }
      to { opacity: 1; transform: none; }
    }
    .sg-page-head {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.18);
    }
    .sg-page-title {
      font-size: 0.95rem; letter-spacing: 0.28em; color: var(--sg-gold); font-weight: 600;
    }
    .sg-page-sub { font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.06em; margin-top: 2px; }
    .sg-page-head-main { display: flex; flex-direction: column; gap: 0; min-width: 0; }
    .sg-page-head-actions { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; }
    .sg-page-footbar {
      flex-shrink: 0;
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      padding: 12px 16px 14px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.22);
    }
    .sg-page-footbar .sg-btn-primary { flex: 1 1 120px; }
    .sg-page-footbar .sg-btn { min-height: 42px; }
    #page1.is-active {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .sg-page1-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    #page1 .sg-cover-shell {
      min-height: auto;
      padding: 16px 16px 12px;
    }
    .sg-page.is-entering {
      animation: sgPageIn 0.55s var(--ease-out) both;
    }
    .sg-page.is-leaving {
      display: block;
      pointer-events: none;
      animation: sgPageOut 0.32s ease forwards;
    }
    @keyframes sgPageIn {
      from { opacity: 0; transform: translateY(14px); filter: blur(4px); }
      to { opacity: 1; transform: none; filter: none; }
    }
    @keyframes sgPageOut {
      from { opacity: 1; transform: none; }
      to { opacity: 0; transform: translateY(-8px); filter: blur(3px); }
    }
    .sg-panel {
      background: var(--panel);
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px 28px;
      box-shadow: var(--shadow);
    }
    .sg-field { margin-bottom: 14px; position: relative; }
    .sg-field label {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.72rem; color: var(--sg-soft); margin-bottom: 6px; letter-spacing: 0.08em;
      text-transform: none;
    }
    .sg-field input, .sg-field select, .sg-field textarea {
      width: 100%; padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius-sm);
      background: rgba(0,0,0,0.38); color: var(--sg-text); font-size: 0.88rem;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }
    .sg-field input:focus, .sg-field select:focus, .sg-field textarea:focus {
      outline: none;
      border-color: var(--border-active);
      box-shadow: 0 0 0 3px rgba(184,146,106,0.1);
      background: rgba(0,0,0,0.48);
    }
    .sg-field input:disabled, .sg-field select:disabled { opacity: 0.5; cursor: not-allowed; }
    .sg-field textarea { min-height: 56px; resize: none; line-height: 1.65; }
    .sg-posture-preview {
      margin-top: 8px; padding: 8px 12px; font-size: 0.8rem; line-height: 1.6;
      color: var(--text-soft); border-radius: 8px;
      background: rgba(184,146,106,0.06); border: 1px solid rgba(184,146,106,0.1);
      display: none;
    }
    .sg-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 14px; }
    @media (max-width: 720px) { .sg-grid-2 { grid-template-columns: 1fr; gap: 0; } }
    .sg-title { font-size: 1.1rem; color: var(--sg-gold); letter-spacing: 0.2em; margin-bottom: 12px; }
    .sg-lead { color: var(--sg-soft); font-size: 0.85rem; margin-bottom: 12px; line-height: 1.7; }
    .sg-intro p { margin-bottom: 10px; font-size: 0.9rem; color: var(--sg-text); opacity: 0.92; }
    .sg-btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
    .sg-btn {
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-active);
      background: linear-gradient(180deg, rgba(184,146,106,0.22), rgba(184,146,106,0.08));
      color: var(--sg-gold);
      cursor: pointer;
      font-size: 0.86rem;
      letter-spacing: 0.06em;
      transition: transform 0.25s var(--ease-spring), box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease;
      box-shadow: 0 4px 18px rgba(0,0,0,0.25);
      white-space: nowrap;
    }
    .sg-btn:hover {
      background: linear-gradient(180deg, rgba(184,146,106,0.38), rgba(184,146,106,0.16));
      box-shadow: var(--shadow-glow), 0 8px 24px rgba(0,0,0,0.35);
      transform: translateY(-1px);
    }
    .sg-btn:active { transform: translateY(0) scale(0.98); }
    .sg-btn.secondary { background: rgba(255,255,255,0.02); border-color: var(--sg-border); color: var(--sg-soft); }
    .sg-btn.ghost { border-color: rgba(255,255,255,0.06); background: rgba(255,255,255,0.03); padding: 8px 14px; font-size: 0.8rem; }
    .sg-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
    .sg-dice {
      border: none; background: none; cursor: pointer;
      font-size: 1rem; padding: 0 4px; opacity: 0.75;
    }
    .sg-dice:hover { opacity: 1; }
    .sg-dice:disabled { opacity: 0.25; cursor: not-allowed; }
    .sg-path-tabs {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
      padding: 4px; border-radius: 999px;
      background: rgba(0,0,0,0.28); border: 1px solid var(--border);
    }
    .sg-path-tab {
      flex: 1 1 auto; min-width: 0;
      padding: 7px 12px; border-radius: 999px; font-size: 0.76rem;
      border: 1px solid transparent; background: transparent; color: var(--sg-soft); cursor: pointer;
      transition: all 0.25s var(--ease-out);
    }
    .sg-path-tab.is-active {
      border-color: var(--border-active); color: var(--sg-gold);
      background: linear-gradient(180deg, rgba(184,146,106,0.22), rgba(184,146,106,0.06));
      box-shadow: 0 2px 12px rgba(184,146,106,0.12);
    }
    .sg-presets { display: flex; flex-direction: column; gap: 8px; }
    .sg-preset {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      transition: border-color 0.25s ease, background 0.25s ease, transform 0.25s var(--ease-spring), box-shadow 0.25s ease;
    }
    .sg-preset:hover { border-color: rgba(184,146,106,0.25); transform: translateX(2px); }
    .sg-preset.is-active {
      border-color: var(--border-active);
      background: linear-gradient(135deg, rgba(184,146,106,0.14), rgba(184,146,106,0.04));
      box-shadow: 0 0 20px rgba(184,146,106,0.08), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .sg-preset-avatar {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: 10px;
      display: grid; place-items: center;
      font-size: 0.85rem; font-weight: 700; color: var(--sg-gold);
      background: linear-gradient(145deg, rgba(184,146,106,0.2), rgba(184,146,106,0.05));
      border: 1px solid rgba(184,146,106,0.2);
    }
    .sg-preset-body { min-width: 0; flex: 1; }
    .sg-preset-name { font-weight: 600; color: var(--sg-gold); font-size: 0.9rem; letter-spacing: 0.06em; }
    .sg-preset-tag { font-size: 0.72rem; color: var(--sg-soft); margin-top: 4px; line-height: 1.55; }
    .sg-preset-limit { font-size: 0.66rem; color: var(--text-dim); margin-top: 6px; letter-spacing: 0.04em; }
    .sg-page2-body {
      flex: 1; min-height: 0;
      display: grid;
      grid-template-columns: minmax(240px, 300px) 1fr;
      gap: 0;
    }
    @media (max-width: 820px) {
      .sg-page2-body { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    }
    .sg-page2-side {
      padding: 16px 14px 16px 16px;
      border-right: 1px solid var(--border);
      background: rgba(0,0,0,0.12);
    }
    @media (max-width: 820px) {
      .sg-page2-side { border-right: none; border-bottom: 1px solid var(--border); max-height: 32vh; }
      .sg-presets,
      .sg-openings {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(220px, 72vw);
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 6px;
        scroll-snap-type: x proximity;
        overscroll-behavior-x: contain;
        touch-action: pan-x pan-y;
      }
      .sg-preset,
      .sg-opening { scroll-snap-align: start; }
    }
    .sg-page2-form {
      padding: 18px 20px 22px;
    }
    .sg-side-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .sg-side-card {
      border: 1px solid rgba(184,146,106,0.1);
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.02);
      padding: 12px;
    }
    .sg-side-card-title {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .sg-side-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .sg-side-card-head .sg-side-card-title {
      margin-bottom: 0;
    }
    .sg-rail-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sg-rail-btn {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid rgba(184,146,106,0.18);
      background: rgba(0,0,0,0.28);
      color: var(--sg-gold);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      transition: background 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
    }
    .sg-rail-btn:hover {
      background: rgba(184,146,106,0.14);
      border-color: rgba(184,146,106,0.42);
    }
    .sg-rail-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .sg-side-card-copy {
      font-size: 0.78rem;
      line-height: 1.65;
      color: var(--text-soft);
      margin-bottom: 10px;
    }
    .sg-form-card {
      margin-bottom: 14px;
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(184,146,106,0.1);
      background: rgba(255,255,255,0.02);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .sg-form-card:last-child {
      margin-bottom: 0;
    }
    .sg-form-section {
      margin-bottom: 0;
      animation: sgFadeUp 0.45s var(--ease-out) both;
    }
    .sg-form-section:nth-child(1) { animation-delay: 0.04s; }
    .sg-form-section:nth-child(2) { animation-delay: 0.08s; }
    .sg-form-section:nth-child(3) { animation-delay: 0.12s; }
    .sg-form-section-title {
      font-size: 0.68rem; letter-spacing: 0.18em; color: var(--accent);
      margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 1px solid rgba(184,146,106,0.12);
    }
    .sg-form-section-copy {
      font-size: 0.78rem;
      line-height: 1.65;
      color: var(--text-dim);
      margin: -4px 0 12px;
    }
    .sg-field-help {
      margin: 6px 0 0;
      font-size: 0.74rem;
      line-height: 1.6;
      color: var(--text-dim);
    }
    .sg-page3-body {
      flex: 1 1 auto; min-height: 0;
      display: grid;
      grid-template-columns: minmax(220px, 280px) 1fr;
      gap: 0;
      align-items: stretch;
    }
    @media (max-width: 820px) {
      .sg-page3-body { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    }
    .sg-node-panel {
      padding: 10px 8px 10px 12px;
      border-right: 1px solid var(--border);
      background: rgba(0,0,0,0.14);
    }
    @media (max-width: 820px) {
      .sg-node-panel { border-right: none; border-bottom: 1px solid var(--border); }
    }
    .sg-openings { display: flex; flex-direction: column; gap: 6px; padding-right: 4px; }
    .sg-opening {
      border: 1px solid transparent; border-radius: var(--radius-sm);
      padding: 10px 12px;
      min-width: 0;
      cursor: pointer;
      background: rgba(255,255,255,0.02);
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s var(--ease-spring), opacity 0.2s;
    }
    .sg-opening:hover:not(.is-disabled) {
      border-color: rgba(184,146,106,0.22);
      background: rgba(184,146,106,0.06);
      transform: translateX(3px);
    }
    .sg-opening.is-active {
      border-color: var(--border-active);
      background: linear-gradient(90deg, rgba(184,146,106,0.16), rgba(184,146,106,0.04));
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .sg-opening.is-disabled { opacity: 0.32; cursor: not-allowed; filter: grayscale(0.4); }
    .sg-opening-title { font-weight: 600; color: var(--sg-gold); font-size: 0.84rem; line-height: 1.35; }
    .sg-opening-meta { font-size: 0.68rem; color: var(--text-dim); margin: 3px 0 0; letter-spacing: 0.04em; }
    .sg-opening-sum { display: none; }
    .sg-node-detail-wrap {
      padding: 16px 18px 18px;
      display: flex; flex-direction: column; min-height: 0;
    }
    .sg-opening-detail {
      flex: 1; min-height: 100%;
      border: 1px solid rgba(184,146,106,0.12);
      border-radius: var(--radius-md);
      background: rgba(0,0,0,0.22);
      padding: 18px 20px;
      animation: sgDetailIn 0.4s var(--ease-out) both;
    }
    @keyframes sgDetailIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }
    .sg-detail-head { font-size: 1rem; color: var(--sg-gold); font-weight: 600; margin-bottom: 4px; }
    .sg-detail-time { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 12px; letter-spacing: 0.06em; }
    .sg-detail-section { margin-bottom: 14px; }
    .sg-detail-section:last-child { margin-bottom: 0; }
    .sg-detail-label { font-size: 0.72rem; color: var(--accent); letter-spacing: 0.12em; margin-bottom: 6px; }

    "canon_before": "后周太祖郭威驾崩，养子柴荣（世宗）即位。北汉联合契丹南侵，周军在高平大胜，追围晋阳未果，秋后撤围班师。符氏（符金盏）册为皇后；谋臣王朴定先灭蜀、后图江南之策。\n\n西征后蜀，蜀主孟昶降。周军南调淮南，围寿州日久，终破城；南唐主李璟称臣，割让淮南，周军班师论功。\n\n显德二年腊月，南唐李璟称臣，割淮南，周军班师回东京。朝堂论功封赏，赵匡胤、张永德、李重进功高震主。孟昶、花蕊夫人东下在途。柴荣身体偶有不豫，禁军暗流在凯旋酒宴底下涌动。\n\n东京赵府惊变，朝野皆传赵匡胤一系与中枢矛盾。柴荣想压住禁军最大山头；储君柴宗训年幼。李继勋在赵匡胤义社酒肉圈中，与李重进表面兄弟、暗里互忌。符二妹、绣珠、玉清开始进入符府视野。\n\n柴荣病兆时隐时现。符彦卿欲以符二妹与郭绍联姻，大名府、上元节符府筹备；玉清可借名供符二妹私会。清虚入宫教符皇后吐纳。秦美人与符皇后争宠。玉莲或已入郭府，杨月娥同院；李圆儿名节受损传闻。\n\n显德三年，柴荣御驾亲征，剑指幽州、涿州。曹彬为北伐涿州统帅；张永德、赵匡胤及诸将随驾。契丹萧思温北线严阵；向训、韩通留守东京。符二妹与郭绍政治绑定日近。",

    "stage_outline": "【此时】显德三年，柴荣御驾亲征，周军北上，剑指幽州、涿州。曹彬为北伐涿州统帅，在御驾左右；张永德、赵匡胤及诸将随驾。\n\n【北线】契丹北院枢密萧思温严阵以待，想守住幽州门户。北汉主刘崇在晋阳观望，看周辽谁占上风再定进退。\n\n【后方】南唐已臣，后蜀已灭；东京由向训、韩通等人留守。符皇后在东京辅政或随驾；符二妹、符六在符府。李重进未随驾或留淮南，仍是朝里一块心病。柴荣一心要成北伐之功。",

    "canon_before": "后周太祖郭威驾崩，养子柴荣（世宗）即位。北汉联合契丹南侵，周军在高平大胜，追围晋阳未果，秋后撤围班师。符氏（符金盏）册为皇后；谋臣王朴定先灭蜀、后图江南之策。\n\n西征后蜀，蜀主孟昶降。周军南调淮南，围寿州日久，终破城；南唐主李璟称臣，割让淮南，周军班师论功。\n\n东京禁军与赵府（赵匡胤一系）矛盾公开；符府促符二妹与郭绍联姻。柴荣御驾北伐涿州受挫，王朴或已卒，柴荣病危。\n\n柴荣驾崩，幼主柴宗训即位，符金盏垂帘摄政。禁军有的受赏有的被漏赏，赵匡胤一系与中枢矛盾摆明，赵点检出走。郭绍掌虎捷军或控鹤军，为符后倚重武将。张太妃在万福宫，上书求于三清殿出家。",
    "canon_private": "柴荣与符氏为夫妻。符金盏与郭绍有河中旧谊；玉莲嫁陈瘸子，与符家旧谊。京娘与赵匡胤义兄妹，与郭绍观中结缘。郭绍北线立功，杨彪、左攸为部曲；史彦超欠救命恩，赵匡胤、张永德在禁军各怀心思。\n\n李圆儿邠州倾心，清虚青泥岭与郭绍结缘；花蕊随蜀降。淮南杨月娥、玉莲同院，陈佳丽、红莺在扬州圈。赵匡胤与李重进义社兄弟，暗里互忌。\n\n符彦卿促符二妹嫁郭绍，秦美人与符后争宠；赵府与中枢猜忌。清虚教符后吐纳，李圆儿名节传闻，董三妹与玉莲同院。\n\n柴荣驾崩，符金盏垂帘；禁军漏赏，赵匡胤出走，与符后矛盾不可调和。郭绍为符后倚重武将，政治同盟渐成。张太妃在万福宫，上书求于三清殿出家。符二妹与郭绍婚事或已定。",

    "canon_before": "后周太祖郭威驾崩，养子柴荣（世宗）即位。北汉联合契丹南侵，周军在高平大胜，追围晋阳未果，秋后撤围班师。符氏（符金盏）册为皇后；谋臣王朴定先灭蜀、后图江南之策。\n\n西征后蜀，蜀主孟昶降。周军南调淮南，围寿州日久，终破城；南唐主李璟称臣，割让淮南，周军班师论功。\n\n东京禁军与赵府（赵匡胤一系）矛盾公开；符府促符二妹与郭绍联姻。柴荣御驾北伐涿州受挫，王朴或已卒，柴荣病危。\n\n柴荣驾崩，幼主柴宗训即位，符金盏垂帘摄政。禁军有的受赏有的被漏赏，赵匡胤一系与中枢矛盾摆明，赵点检出走。郭绍掌虎捷军或控鹤军，为符后倚重武将。张太妃在万福宫，上书求于三清殿出家。\n\n李重进、李继勋「二李」蠢蠢欲动，符金盏调郭绍、史彦超、杨彪等人平叛，晋州、潞州一线战事时起时落。赵匡胤若出走北汉，成摄政外患；刘崇在边用之。符二妹为郭绍正室。后蜀孟昶、花蕊夫人东下入洛；李煜守金陵。\n\n二李之乱收束，郭绍秉政。周军渡江南下，采石、江宁一线战云密布。曹彬为渡江统帅，李处耘占池州，趋采石矶，剑南军高彦俦随后增援。李煜在金陵坐守；周宪为大周后。劝进之声在班师路上隐约可闻。",

    "stage_outline": "【此时】「二李」之乱收束，禁军大将郭绍秉政。周军渡江南下，采石、江宁一线战云密布——这是灭南唐的最后一战。\n\n【江南】南唐后主李煜在金陵坐守，想保半壁江南；大周后周宪、其妹周嘉敏、歌伎杨月娥在后宫与城防之间各怀心思。李煜想议和保族，郭绍想一举定江南。\n\n【周军】渡江统帅曹彬，以及韩通、韩令坤等将分路进攻；李处耘占池州，趋采石矶，剑南军高彦俦等随后增援。符太后在东京或随军筹画。\n\n【远处】北汉、契丹仍踞北边，朝里已有人窃议郭绍功高。采石浮桥、当涂、锁溪河一线，两军围绕渡口部署；班师路上劝进之声隐约可闻。",

    "stage_outline": "【此时】国号渐称大许，版图南及江南、西及剑南，但幽州仍在辽人手里。涿州前线日夜备战，辽南院与周（许）军对峙成常态。\n\n【北线】无定河一线战事时紧时松；萧思温、萧绰在辽廷主和主战之间摇摆。朝廷在海路组建蛟龙军，想从东南另辟战线，不在涿州一条道上死磕。\n\n【朝局】符二妹为后；玉莲、李圆儿、杨月娥、周嘉敏、李月姬、张太妃等在后宫；符金盏、白姥、陆岚在京中各守其位。曹彬、史彦超、韩通、左攸、杨彪等人或在前线或在朝堂，围着北伐、海路、粮饷转。\n\n【远处】降藩李煜、孟昶羁縻洛阳。朝廷想建北到幽州、南及海疆的一统之局；辽廷想拖垮锐气，保幽州不失——天下并未真正安宁，更大的博弈才刚开头。",

(function () {
  const COUNTRIES = ["后周", "北汉", "契丹", "南唐", "后蜀", "吴越", "荆南", "南汉", "闽", "其他"];
  const state = {
    page: 1,
    path: "custom",
    presetKey: null,
    stageMin: 1,
    stageMax: 22,
    lock: [],
    selectedIdx: 0,
  };

  const $ = (id) => document.getElementById(id);
  const pick = (arr) => (arr && arr.length ? arr[Math.floor(Math.random() * arr.length)] : "");
  const pickWeighted = (weights) => {
    const entries = Object.entries(weights || {});
    if (!entries.length) return null;
    let total = 0;
    for (const [, w] of entries) total += Number(w) || 0;
    let r = Math.random() * total;
    for (const [k, w] of entries) {
      r -= Number(w) || 0;
      if (r <= 0) return k;
    }
    return entries[entries.length - 1][0];
  };

  function getApi(name) {
    try {
      if (typeof getContext === "function") {
        const ctx = getContext();
        if (ctx && ctx[name] !== undefined) return ctx[name];
      }
    } catch (e) {}
    return window[name];
  }

  async function waitMvu() {
    if (typeof waitGlobalInitialized === "function") {
      try { await waitGlobalInitialized("Mvu"); return getApi("Mvu") || window.Mvu; } catch (e) {}
    }
    for (let i = 0; i < 60; i++) {
      const Mvu = getApi("Mvu") || window.Mvu;
      if (Mvu && Mvu.parseMessage) return Mvu;
      await new Promise((r) => setTimeout(r, 50));
    }
    return null;
  }

  function initStoryIntro() {
    const box = $("storyIntro");
    if (!box) return;
    const paras = Array.isArray(COVER_STORY_INTRO) ? COVER_STORY_INTRO : [];
    box.innerHTML = paras.map((p) => `<p>${p}</p>`).join("");
  }

  function renderPersonas() {
    const track = $("personaTrack");
    const dots = $("personaDots");
    if (!track || !dots) return;
    track.innerHTML = "";
    dots.innerHTML = "";
    (COVER_PERSONAS || []).forEach((item, i) => {
      const slide = document.createElement("div");
      slide.className = "sg-slide";
      const img0 = (item.images && item.images[0]) || "";
      const img1 = (item.images && item.images[1]) || "";
      const hasImg = Boolean(img0);
      const backHtml = hasImg
        ? `<div class="sg-portrait-face back" data-bg-url="${img1 || img0}"></div>`
        : `<div class="sg-portrait-backcopy">${item.back || ""}</div>`;
      const fillHtml = hasImg ? "" : `<div class="sg-portrait-fill">${item.mark || item.name.slice(0, 1)}</div>`;
      slide.innerHTML = `
        <article class="sg-persona">
          <div class="sg-persona-visual">
            <div class="sg-portrait-flip" data-persona-idx="${i}" role="button" tabindex="0" aria-pressed="false" aria-label="${item.name}，点击翻转" title="点击翻转">
              <span class="sg-portrait-flip-hint">翻转</span>
              <div class="sg-portrait-inner">
                <div class="sg-portrait-face front" data-bg-url="${img0}"></div>
                ${backHtml}
              </div>
              ${fillHtml}
            </div>
          </div>
          <div class="sg-persona-info">
            <h3 class="sg-persona-name">${item.name}</h3>
            ${item.role ? `<p class="sg-persona-role-line">${item.role}</p>` : ""}
            <p class="sg-persona-copy">${item.copy || ""}</p>
          </div>
        </article>`;
      track.appendChild(slide);
      const dot = document.createElement("button");
      dot.type = "button";
      dot.className = "sg-dot";
      dot.dataset.index = String(i);
      dot.setAttribute("aria-label", "查看" + item.name);
      dots.appendChild(dot);
    });
  }

  function ensurePersonaFaceLoaded(face) {
    if (!face || face.dataset.bgLoaded === "1" || face.dataset.bgLoaded === "loading") return;
    const url = face.dataset.bgUrl;
    if (!url) return;
    face.dataset.bgLoaded = "loading";
    const img = new Image();
    img.onload = () => {
      face.style.backgroundImage = `url('${url.replace(/'/g, "%27")}')`;
      face.dataset.bgLoaded = "1";
    };
    img.onerror = () => { face.dataset.bgLoaded = "error"; };
    img.src = url;
  }

  function activatePersonaImages(index) {
    const slide = document.querySelectorAll("#personaTrack .sg-slide")[index];
    if (!slide) return;
    ensurePersonaFaceLoaded(slide.querySelector(".sg-portrait-face.front"));
  }

  function togglePersonaFlip(flip) {
    if (!flip) return;
    const back = flip.querySelector(".sg-portrait-face.back");
    if (back) ensurePersonaFaceLoaded(back);
    const flipped = flip.classList.toggle("is-flipped");
    flip.setAttribute("aria-pressed", flipped ? "true" : "false");
  }

  function setupPersonaCarousel() {
    const total = (COVER_PERSONAS || []).length;
    const root = $("personaCarousel");
    const track = $("personaTrack");
    const dots = $("personaDots");
    if (!total || !root || !track || !dots) return;
    let current = 0;
    function resetFlips() {
      document.querySelectorAll("#personaTrack .sg-portrait-flip.is-flipped").forEach((flip) => {
        flip.classList.remove("is-flipped");
        flip.setAttribute("aria-pressed", "false");
      });
    }
    function update() {
      track.style.transform = `translateX(-${current * 100}%)`;
      [...dots.children].forEach((dot, i) => {
        dot.classList.toggle("active", i === current);
        dot.setAttribute("aria-current", i === current ? "true" : "false");
      });
      const counter = $("personaCounter");
      const item = (COVER_PERSONAS || [])[current];
      if (counter) {
        counter.textContent = `${current + 1} / ${total}`;
      }
      activatePersonaImages(current);
    }
    function go(next) {
      current = (next + total) % total;
      resetFlips();
      update();
    }
    root.querySelector('[data-prev="persona"]').addEventListener("click", () => go(current - 1));
    root.querySelector('[data-next="persona"]').addEventListener("click", () => go(current + 1));
    dots.addEventListener("click", (e) => {
      const dot = e.target.closest(".sg-dot");
      if (!dot) return;
      go(Number(dot.dataset.index));
    });
    let touchStartX = 0, touchStartY = 0, touchDeltaX = 0, touchDeltaY = 0;
    root.addEventListener("touchstart", (e) => {
      if (e.target.closest(".sg-portrait-flip")) return;
      const touch = e.changedTouches && e.changedTouches[0];
      if (!touch) return;
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      touchDeltaX = 0;
      touchDeltaY = 0;
    }, { passive: true });
    root.addEventListener("touchmove", (e) => {
      const touch = e.changedTouches && e.changedTouches[0];
      if (!touch) return;
      touchDeltaX = touch.clientX - touchStartX;
      touchDeltaY = touch.clientY - touchStartY;
    }, { passive: true });
    root.addEventListener("touchend", () => {
      if (Math.abs(touchDeltaX) > 42 && Math.abs(touchDeltaX) > Math.abs(touchDeltaY)) {
        go(current + (touchDeltaX < 0 ? 1 : -1));
      }
    }, { passive: true });
    track.addEventListener("click", (e) => {
      const flip = e.target.closest(".sg-portrait-flip");
      if (!flip) return;
      e.stopPropagation();
      togglePersonaFlip(flip);
    });
    track.addEventListener("keydown", (e) => {
      const flip = e.target.closest(".sg-portrait-flip");
      if (!flip || (e.key !== "Enter" && e.key !== " ")) return;
      e.preventDefault();
      togglePersonaFlip(flip);
    });
    update();
  }

  function isLocked(field) {
    return state.path === "custom" ? false : state.lock.includes(field);
  }

  function composeOrigin() {
    const place = $("fPlace").value;
    const rank = $("fRank").value;
    if (place && rank) return `${place}人，${rank}出身`;

    if (rank) return `${rank}出身`;

  function autoStatus(loc, identity) {
    const bits = [];
    if (loc) bits.push(`在${loc}`);
    if (identity) bits.push(`做${identity}`);

  }

  function updatePosturePreview() {
    const el = $("posturePreview");

    el.style.display = t ? "block" : "none";

    const custom = ($("fPostureText") || {}).value?.trim();
    if (custom) return custom;
    const key = $("fPosture").value;
    const list = COVER_RANDOM_POOLS.入局姿态 || [];

  }

  function updatePersonaDraft() {
    const hint = $("presetHint");
    if (!hint) return;
    if (state.presetKey) {
      const preset = PROTAGONIST_PRESETS[state.presetKey];
      hint.textContent = `预制人物「${state.presetKey}」 · 可玩序 ${state.stageMin}–${state.stageMax}`;

      hint.textContent = "手填没有序号限制；选卡会自动收窄可入局的范围。";

  function presetPool(field) {
    const key = state.presetKey;
    if (!key) return null;
    const block = (COVER_RANDOM_POOLS.预制 || {})[key];
    const pool = block?.[field];
    return Array.isArray(pool) && pool.length ? pool : null;
  }

  function persona() {
    const pd = currentOpening()?.protagonist_defaults || {};
    const preset = state.presetKey ? PROTAGONIST_PRESETS[state.presetKey] : {};
    const locMap = preset.default_locations || {};
    const stage = currentOpening()?.stage;
    const loc = (stage && locMap[stage]) || pd.当前位置 || "";
    const identity = $("fIdentity").value.trim() || preset.身份 || "";
    return {
      姓名: $("fName").value.trim() || preset.姓名 || "",
      归属国: $("fCountry").value || preset.归属国 || "后周",
      身份: identity,
      官阶: $("fOffice").value.trim() || preset.官阶 || "",
      兵力: $("fForces").value.trim() || preset.兵力 || "",
      势力范围: $("fSphere").value.trim() || preset.势力范围 || "",
      出身: composeOrigin() || preset.出身 || "",
      能力: $("fAbility").value.trim(),
      当前位置: loc,
      当前状态: autoStatus(loc, identity),
    };
  }

  function currentOpening() {
    return OPENINGS[state.selectedIdx] || null;
  }

  function allowedIndices() {
    return OPENINGS.map((op, i) => ({ op, i })).filter(({ op }) => {
      const s = op.stage;
      return s >= state.stageMin && s <= state.stageMax;
    });
  }

  function goPage(n) {
    const nextEl = $(`page${n}`);
    const curEl = document.querySelector(".sg-page.is-active");
    const header = $("mainHeader");
    const finish = () => {
      state.page = n;
      document.querySelectorAll(".sg-page").forEach((el) => {
        el.classList.remove("is-active", "is-leaving", "is-entering");
        el.style.display = el.id === `page${n}` ? "flex" : "none";
      });
      nextEl.classList.add("is-active");
      if (state.page !== 1 || curEl) nextEl.classList.add("is-entering");
      if (header) header.classList.toggle("is-home", n === 1);
      document.body.dataset.page = String(n);
      document.querySelectorAll(".sg-step").forEach((el) => {
        const step = Number(el.dataset.step);
        el.classList.toggle("is-active", step === n);
        el.classList.toggle("is-done", step < n);
      });
      if (n === 3) {
        clampSelectedStage();
        renderOpenings();
        renderOpeningDetail();
      }
      if (n === 2) syncFieldLocks();
    };
    if (curEl && curEl !== nextEl) {
      curEl.classList.add("is-leaving");
      curEl.classList.remove("is-active");
      setTimeout(finish, 320);
      return;
    }
    finish();
  }

  function clampSelectedStage() {
    const allowed = allowedIndices();
    if (!allowed.length) return;
    const cur = OPENINGS[state.selectedIdx];
    if (!cur || cur.stage < state.stageMin || cur.stage > state.stageMax) {
      state.selectedIdx = allowed[0].i;
    }
  }

    $("fPlace").innerHTML = ['<option value="">—</option>'].concat(pool.map((p) => `<option value="${p}">${p}</option>`)).join("");
    if (pool.includes(prev)) $("fPlace").value = prev;

  function fillPostureSelect() {

    const p = PROTAGONIST_PRESETS[key];
    if (!p) return;
    state.presetKey = key;
    state.stageMin = p.stage_min ?? 1;
    state.stageMax = p.stage_max ?? 22;
    state.lock = p.lock || [];
    $("fName").value = p.姓名 || "";
    $("fCountry").value = p.归属国 || "后周";
    fillPlaceSelect();
    $("fIdentity").value = p.身份 || "";
    $("fOffice").value = p.官阶 || "";
    $("fForces").value = p.兵力 || "";
    $("fSphere").value = p.势力范围 || "";
    if (p.出身) {
      $("fRank").value = "";
      $("fPlace").value = "";
      $("fIdentity").dataset.originOverride = p.出身;
    } else {
      delete $("fIdentity").dataset.originOverride;
    }
    $("limitHint").style.display = p.limit_reason ? "block" : "none";
    $("limitHint").textContent = p.limit_reason
      ? `可玩开场序 ${state.stageMin}–${state.stageMax}。${p.limit_reason}`
      : "";
    syncFieldLocks();
    renderPresetGrid();
    updatePersonaDraft();
  }

  function clearPreset() {
    state.presetKey = null;
    state.stageMin = 1;
    state.stageMax = 22;
    state.lock = [];
    delete $("fIdentity").dataset.originOverride;
    $("fPostureText").value = "";
    $("limitHint").style.display = "none";
    syncFieldLocks();
    renderPresetGrid();
    updatePersonaDraft();
  }

  function syncFieldLocks() {
    const map = { 姓名: "fName", 归属国: "fCountry", 身份: "fIdentity", 官阶: "fOffice", 兵力: "fForces", 势力范围: "fSphere" };
    for (const [field, id] of Object.entries(map)) {
      $(id).disabled = isLocked(field);
    }
    document.querySelectorAll(".sg-dice").forEach((btn) => {
      const f = btn.dataset.roll;
      btn.disabled = isLocked(f) || (state.path !== "custom" && ["姓名", "归属国", "身份"].includes(f) && isLocked(f));
    });
    updatePersonaDraft();
  }

  function renderPresetGrid() {
    const grid = $("presetGrid");
    grid.innerHTML = "";
    const entries = Object.entries(PROTAGONIST_PRESETS);
    const filtered = entries.filter(([, p]) => {
      if (state.path === "featured") return p.featured;
      if (state.path === "all") return !p.featured;
      return false;
    });
    filtered.forEach(([key, p]) => {
      const card = document.createElement("div");
      card.className = "sg-preset" + (state.presetKey === key ? " is-active" : "");
      const initial = key.slice(0, 1);
      card.innerHTML = `
        <div class="sg-preset-avatar">${initial}</div>
        <div class="sg-preset-body">
          <div class="sg-preset-name">${key}</div>
          <div class="sg-preset-tag">${p.tagline || ""}</div>
          <div class="sg-preset-limit">序 ${p.stage_min ?? 1}–${p.stage_max ?? 22}</div>
        </div>`;
      card.addEventListener("click", () => {
        state.path = state.path === "custom" ? "featured" : state.path;
        applyPreset(key);
    $("fPostureText").value = "";
      });
      grid.appendChild(card);
    });
  }

  function rollField(name) {
    if (isLocked(name)) return;
    const pools = COVER_RANDOM_POOLS;
    if (name === "归属国") {
      $("fCountry").value = pick(COUNTRIES);
      fillPlaceSelect();
      updatePersonaDraft();
      return;
    }
    if (name === "门第") {
      $("fRank").value = pick(pools.门第 || []);
      updatePersonaDraft();
      return;
    }
    if (name === "籍贯") {
      fillPlaceSelect();
      $("fPlace").value = pick(($("fPlace").options.length > 1 ? [...$("fPlace").options].slice(1).map((o) => o.value) : []));
      updatePersonaDraft();
      return;
    }
    if (name === "身份") {
      const rank = $("fRank").value || pick(pools.门第 || []);
      $("fRank").value = rank;
      const country = $("fCountry").value;
      const idPool = pools.身份 || {};
      const branch = (idPool[rank] || {})[country] || idPool[rank]?.default || idPool.default || ["行脚人"];
      $("fIdentity").value = pick(Array.isArray(branch) ? branch : [branch]);
      updatePersonaDraft();
      return;
    }
    if (name === "能力") {
      const pp = presetPool("能力");
      if (pp) { $("fAbility").value = pick(pp); updatePersonaDraft(); return; }
      const rank = $("fRank").value;
      const ab = pools.能力 || {};
      const branch = [...(ab.通用 || []), ...(ab[rank] || [])];
      $("fAbility").value = pick(branch.length ? branch : ab.通用 || []);
      updatePersonaDraft();
      return;
    }
    if (name === "姓名") {
      const rank = $("fRank").value || pick(pools.门第 || []);
      const nm = pools.姓名 || {};
      $("fName").value = pick(nm[rank] || Object.values(nm).flat());
      updatePersonaDraft();
      return;
    }
    if (name === "入局姿态") {
      const pp = presetPool("入局姿态");
      if (pp) {
        $("fPostureText").value = pick(pp);
        updatePosturePreview();
        updatePersonaDraft();
        return;
      }
      $("fPostureText").value = "";
      const list = pools.入局姿态 || [];
      if (list.length) $("fPosture").value = pick(list).key;
      updatePosturePreview();
      updatePersonaDraft();
      return;
    }
    if (name === "志愿") {
      const pp = presetPool("志愿");
      if (pp) { $("fWish").value = pick(pp); updatePersonaDraft(); return; }
      const country = $("fCountry").value;
      const w = pools.志愿 || {};
      const branch = [...(w.通用 || []), ...(w[country] || [])];
      $("fWish").value = pick(branch);
      updatePersonaDraft();
    }
  }

  function rollFull(skipPreset) {
    if (state.path === "custom" || skipPreset) {
      (poolsOrder()).forEach((f) => rollField(f));
      return;
    }
    const sub = (COVER_RANDOM_POOLS.global_rolls?.随缘开局?.预制子池) || Object.keys(PROTAGONIST_PRESETS);
    applyPreset(pick(sub));
    ["能力", "入局姿态", "志愿"].forEach((f) => rollField(f));
  }

  function poolsOrder() {
    return (COVER_RANDOM_POOLS.global_rolls?.纯手填一套?.顺序) ||
      ["归属国", "门第", "籍贯", "身份", "能力", "姓名", "入局姿态", "志愿"];
  }

  function luckyStart() {
    const gr = COVER_RANDOM_POOLS.global_rolls?.随缘开局;
    const pathRoll = pickWeighted(gr?.路径权重 || { 手填自定义: 55, 预制: 45 });
    if (pathRoll === "预制") {
      state.path = "featured";
      document.querySelectorAll(".sg-path-tab").forEach((t) => t.classList.toggle("is-active", t.dataset.path === "featured"));
      $("presetArea").style.display = "block";
      applyPreset(pick(gr?.预制子池 || Object.keys(PROTAGONIST_PRESETS)));
      rollField("能力");
      rollField("入局姿态");
      rollField("志愿");
    } else {
      state.path = "custom";
      clearPreset();
      document.querySelectorAll(".sg-path-tab").forEach((t) => t.classList.toggle("is-active", t.dataset.path === "custom"));
      $("presetArea").style.display = "none";
      poolsOrder().forEach((f) => rollField(f));
    }
    randomNode();
    goPage(3);
  }

  function openingTime(op) {
    const meta = op.meta || [];
    const t = meta.find((m) => !/^ch[\.\s]/i.test(String(m).trim()));
    return t || meta[0] || "";
  }

  function openModal(title, html, usePre) {
    $("modalTitle").textContent = title;
    if (usePre) {
      $("modalPre").style.display = "block";
      $("modalPre").textContent = html;
      $("modalContent").style.display = "none";
      $("modalContent").innerHTML = "";
    } else {
      $("modalPre").style.display = "none";
      $("modalContent").style.display = "block";
      $("modalContent").innerHTML = html;
    }
    $("modal").classList.add("is-open");
  }

  function closeModal() {
    $("modal").classList.remove("is-open");
  }

  function buildCountriesHtml(op) {
    if (!op) return "<p>请先选择开场序。</p>";
    const patch = op.countries_patch || {};
    const parts = [];
    for (const [country, fields] of Object.entries(patch)) {
      const stance = fields.态势 || "";
      const event = fields.当前事件 || "";
      const rumor = fields.私情风闻 || "";
      if (!stance && !event) continue;
      let inner = "";
      if (stance) inner += `<div><strong>态势</strong> ${stance}</div>`;
      if (event) inner += `<div><strong>事件</strong> ${event}</div>`;
      if (rumor && !/^无涉/.test(rumor)) {
        inner += `<div style="margin-top:6px;color:var(--text-dim)"><strong>风闻</strong> ${rumor}</div>`;
      }
      parts.push(`<div class="sg-rumor"><div class="sg-rumor-country">${country}</div>${inner}</div>`);
    }
    return parts.length
      ? parts.join("")
      : "<p style=\"color:var(--text-dim)\">本序暂无诸国数据。</p>";
  }

    const p = persona();
    const preset = state.presetKey ? PROTAGONIST_PRESETS[state.presetKey] : null;

      <dt>归属国</dt><dd>${p.归属国}</dd>
      <dt>出身</dt><dd>${p.出身 || "未定"}</dd>
      <dt>身份</dt><dd>${p.身份 || "未定"}</dd>
      <dt>官阶</dt><dd>${p.官阶 || "未定"}</dd>
      <dt>兵力</dt><dd>${p.兵力 || "未定"}</dd>
      <dt>势力范围</dt><dd>${p.势力范围 || "未定"}</dd>
      <dt>能力</dt><dd>${p.能力 || "未定"}</dd>
      <dt>入局姿态</dt><dd>${posture || "未定"}</dd>

    openModal(`当前诸国情况 · ${op.title}`, buildCountriesHtml(op));

  function quickReroll() {
    if (state.path === "custom" || !state.presetKey) {
      poolsOrder().forEach((f) => rollField(f));

  }

  function randomNode() {
    const allowed = allowedIndices();
    if (!allowed.length) return;
    const chosen = pick(allowed);
    state.selectedIdx = chosen.i;
    renderOpenings();
    renderOpeningDetail();
    $("status").textContent = `已随机至：${OPENINGS[state.selectedIdx].title}`;

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function formatReaderText(text) {
    if (!text) return "";
    return String(text).trim().split(/\n\n+/).map((p) => {
      const m = p.match(/^【([^】]+)】\s*([\s\S]*)$/);
      if (m) {
        return `<div class="sg-detail-section"><div class="sg-detail-label">${escapeHtml(m[1])}</div><div class="sg-detail-text">${escapeHtml(m[2].trim())}</div></div>`;
      }
      return `<div class="sg-detail-section"><div class="sg-detail-text">${escapeHtml(p.trim())}</div></div>`;
    }).join("");
  }

  function renderOpeningDetail() {
    const box = $("openingDetail");
    if (!box) return;
    const op = currentOpening();
    box.style.animation = "none";
    void box.offsetWidth;
    box.style.animation = "";
    if (!op) {
      box.innerHTML = "<p class=\"sg-detail-text\">暂无节点数据。</p>";
      return;
    }
    const sections = [];
    if (op.summary) {
      sections.push(`<div class="sg-detail-section"><div class="sg-detail-label">这一序讲什么</div><div class="sg-detail-text">${escapeHtml(op.summary)}</div></div>`);
    }
    if (op.stage_outline) {
      sections.push(formatReaderText(op.stage_outline));
    }
    const tags = (op.tags || []).map((t) => `<span class="sg-tag">${t}</span>`).join("");
    box.innerHTML = `
      <div class="sg-detail-head">${op.no} · ${op.title}</div>
      <div class="sg-detail-time">${openingTime(op)}</div>
      ${sections.join("")}
      ${tags ? `<div class="sg-tags" style="margin-top:10px">${tags}</div>` : ""}`;
  }

  function renderOpenings() {
    const el = $("openingList");
    el.innerHTML = "";
    OPENINGS.forEach((op, i) => {
      const disabled = op.stage < state.stageMin || op.stage > state.stageMax;
      const card = document.createElement("div");
      card.className = "sg-opening" + (i === state.selectedIdx ? " is-active" : "") + (disabled ? " is-disabled" : "");
      const tags = (op.tags || []).map((t) => `<span class="sg-tag">${t}</span>`).join("");
      card.innerHTML = `
        <div class="sg-opening-title">${op.no} · ${op.title}</div>
        <div class="sg-opening-meta">${openingTime(op)}</div>
        <div class="sg-opening-sum">${op.summary || ""}</div>
        <div class="sg-tags">${tags}</div>`;
      if (!disabled) {
        card.addEventListener("click", () => {
          state.selectedIdx = i;
          renderOpenings();
          renderOpeningDetail();
          $("status").textContent = "";
        });
      }
      el.appendChild(card);
    });
  }

  function countriesSummary(op) {
    const lines = [];
    for (const [country, fields] of Object.entries(op.countries_patch || {})) {
      const bits = [fields.态势, fields.当前事件].filter(Boolean);
      if (bits.length) lines.push(`${country}：${bits.join("；")}`);
    }
    return lines.join("\n");
  }

  function buildPatches(op, p) {
    const patches = [
      { op: "replace", path: "/世界/开场序", value: op.stage },
      { op: "replace", path: "/世界/回合", value: 1 },
    ];
    const pd = op.protagonist_defaults || {};
    const preset = state.presetKey ? PROTAGONIST_PRESETS[state.presetKey] : {};
    const locMap = preset.default_locations || {};
    const loc = p.当前位置 || locMap[op.stage] || pd.当前位置 || "";
    if (loc) {
      patches.push({ op: "replace", path: "/世界/当前地点", value: loc });
      patches.push({ op: "replace", path: "/主角/当前位置", value: loc });
    }
    for (const [country, fields] of Object.entries(op.countries_patch || {})) {
      for (const [fk, fv] of Object.entries(fields || {})) {
        patches.push({ op: "replace", path: `/诸国志/${country}/${fk}`, value: fv });
      }
    }
    const merged = { ...pd, ...p, 归属国: p.归属国 || pd.归属国 || "后周" };
    if ($("fIdentity").dataset.originOverride) merged.出身 = $("fIdentity").dataset.originOverride;
    for (const [k, v] of Object.entries(merged)) {
      if (v !== undefined && v !== null && v !== "") {
        patches.push({ op: "replace", path: `/主角/${k}`, value: v });
      }
    }
    for (const [name, ent] of Object.entries(op.qunfang_patch || {})) {
      const raw = { ...(ent || {}) };
      const rel = raw.关系 || raw.与user关系 || "陌路";
      delete raw.关系;
      delete raw.与user关系;
      patches.push({
        op: "insert",
        path: `/群芳录/${name}`,
        value: {
          是否登场: false,
          当前位置: raw.当前位置 || "东京",
          好感度: 0,
          好感度上限: 100,
          服饰: "",
          外貌: "",
          当前状态: "",
          心里想法: "",
          心情: "",
          与user关系: rel,
          ...raw,
        },
      });
    }
    return patches;
  }

  function buildPrompt(op, p) {
    const wish = $("fWish").value.trim();
    const displayName = p.姓名 || "{{user}}";
    const posture = postureSentence();
    const parts = [
      `【十国千娇 · 首楼】${op.title}（第${op.stage}序）· ${openingTime(op)}`,
      "",
    ];
    if (op.canon_before) parts.push(op.canon_before, "");
    if (op.stage_outline) parts.push(op.stage_outline, "");
    else if (op.summary) parts.push(op.summary, "");
    const sum = countriesSummary(op);
    if (sum) parts.push(sum, "");
    const origin = p.出身 ? `${p.出身}人` : `${p.归属国}人`;
    const id = p.身份 || "闲人";
    let hero = `${displayName}，${origin}，如今在${id}。`;
    if (p.能力) hero += `会${p.能力}。`;
    parts.push(hero);
    if (posture) parts.push(posture);
    if (wish) parts.push(`打算：${wish}`);
    parts.push(
      "",
      "请写第一楼正文：第三人称，称主角为 {{user}}；符合上文节点与诸国，不剧透后续；结尾输出 <UpdateVariable> JSON Patch（开场序、主角、诸国志、群芳录等）。",
    );
    return parts.join("\n");
  }

  async function startGame() {
    const op = currentOpening();
    if (!op) {
      $("status").textContent = "请先选择开场序";
      return;
    }
    if (op.stage < state.stageMin || op.stage > state.stageMax) {
      $("status").textContent = "当前预制卡不可选此序";
      return;
    }
    const p = persona();
    $("status").textContent = "正在开局…";
    const patchBlock = [
      "<UpdateVariable>",
      "<Analysis>Cover init</Analysis>",
      "<JSONPatch>",
      JSON.stringify(buildPatches(op, p), null, 2),
      "</JSONPatch>",
      "</UpdateVariable>",
    ].join("\n");
    const inTavern = await applyVariables(patchBlock);
    const prompt = buildPrompt(op, p);
    const generateFn = getApi("generate") || getApi("Generate");
    const setChat = getApi("setChatMessages");
    const getChat = getApi("getChatMessages");

    if (generateFn) {
      try {
        await generateFn({ user_input: prompt, should_stream: true });
        $("status").textContent = "已开局，请查看新楼层。";
        return;
      } catch (e) { console.warn(e); }
    }
    if (setChat && getChat) {
      const msgs = getChat("0", { include_swipes: false }) || [];
      if (msgs[0]) {
        await setChat([{ message_id: 0, mes: patchBlock + "\n\n" + prompt }], { refresh: "affected" });
        $("status").textContent = "已写入开局提示词。";
        return;
      }
    }
    $("status").textContent = inTavern
      ? "变量已初始化；请在酒馆中手动发送开局提示。"
      : "本地预览：无酒馆 API，请直接在酒馆中使用封面。";
  }

  async function applyVariables(text) {
    const Mvu = await waitMvu();
    if (!Mvu) return false;
    const oldData = Mvu.getMvuData({ type: "message", message_id: 0 });
    const newData = await Mvu.parseMessage(String(text), oldData || undefined);
    await Mvu.replaceMvuData(newData, { type: "message", message_id: 0 });
    const ee = getApi("eventEmit");
    if (ee) try { ee("message_variables_changed"); } catch (e) {}
    return true;
  }
