            if (mvuUpdateStop) __mnxEventStops.push(mvuUpdateStop);
            }
            var _eventOn = typeof eventOn === 'function' ? eventOn : (window.parent && typeof window.parent.eventOn === 'function' ? window.parent.eventOn.bind(window.parent) : null);
            var _events = window.tavern_events || (window.parent && window.parent.tavern_events) || {};
            ['MESSAGE_RECEIVED','MESSAGE_UPDATED','MESSAGE_SWIPED','CHARACTER_MESSAGE_RENDERED','MESSAGE_DELETED','CHAT_CHANGED'].forEach(function(key) {
                if (_eventOn && _events && _events[key]) {
                    try {
                        var eventStop = _eventOn(_events[key], function(){
                            if (window.DwfMvu && DwfMvu.invalidateMvuReadCaches) DwfMvu.invalidateMvuReadCaches();
                            invalidateEnsureLiveStatusBarCache();
                            if (ensureLiveStatusBar()) scheduleRefreshScene(key === 'MESSAGE_RECEIVED' || key === 'MESSAGE_UPDATED');
                        });
                        if (eventStop) __mnxEventStops.push(eventStop);
                    } catch(e) {}
                }
            });
            if (!_eventOn && !__mnxPollTimer) {
                __mnxPollTimer = setInterval(function(){
                    if (document.hidden) return;
                    ensureLiveStatusBarCached();
                    if (__mnxIsLiveBar) scheduleRefreshScene(false);
                }, STATUS_POLL_INTERVAL);
            }

            function openGalleryManager() {
                setShown('st-m', true);
                setShown('opt-m', false);
                renderManager();
                setTimeout(function(){ $('#st-box .st-scroll').scrollTop(0); }, 30);
            }

            $('#mt').on('click', function() { setShown('opt-m', !isShown('opt-m')); });
            $('#lk').on('click', openGalleryManager);
            $(document).on('click', '#gallery-hint', openGalleryManager);
            $('#st-close').on('click', function() {
                releaseGalleryImages($('#st-grid'), true);
                setShown('st-m', false);
            });
            $('#theme-trigger').on('click', function() { $('#theme-list').toggleClass('show'); });

            $('#theme-list').on('click', '.theme-item', function() {
                uiPrefs.theme = $(this).attr('data-theme-key');
                saveUiPrefs();
                applyUiPrefs();
                $('#theme-list').removeClass('show');
            });

            function bindRng(id, k) {
                $('#' + id).on('input', function() {
                    uiPrefs[k] = Number($(this).val());
                    saveUiPrefs();
                    applyUiPrefs();
                    scheduleRefreshScene(true);
                });
            }
            bindRng('support-visible-range', 'supportVisibleLimit');

            $('#st-tabs').on('click', '.st-tab', function() {
                managerIndex = Number($(this).attr('data-idx'));
                renderManager();
            });

            $(document).on('click', '#st-tab-prev', function() { stepGalleryTab(-1); });
            $(document).on('click', '#st-tab-next', function() { stepGalleryTab(1); });
            $(document).on('scroll', '#st-tabs', updateGalleryTabNavState);

            $('#st-grid').on('click', '.st-img-c', function() {
                var $btn = $(this);
                if($btn.hasClass('locked')) return;
                var name = GALLERY_ROLE_ORDER[managerIndex];
                var url = $btn.attr('data-u');
                var alreadySelected = $btn.hasClass('sel') && getSelectedPortrait(name) === url;
                if (alreadySelected) {
                    openTopImagePreview(url);
                    return;
                }
                setSelectedPortrait(name, url);
                refreshScene(true, { skipManager: true });
                $('#st-grid .st-img-c').removeClass('sel').attr('aria-pressed', 'false');
                $btn.addClass('sel').attr('aria-pressed', 'true');
            });

            $('#st-reset').on('click', function() {
                var name = GALLERY_ROLE_ORDER[managerIndex];
                var wasRandom = isRandomPortraitMode(name);
                var picked = '';
                if (wasRandom) {
                    clearSelectedPortrait(name);
                } else {
                    picked = randomizeSelectedPortrait(name);
                }
                refreshScene(true, { skipManager: true });
                renderManager();
                var $btn = $('#st-reset span');
                var oldText = $btn.text();
                $btn.text(wasRandom ? '已取消随机' : (picked ? '已随机切换' : '暂无可随机立绘'));
                setTimeout(function(){ $btn.text(isRandomPortraitMode(name) ? '随机展示中' : '随机展示'); }, 1200);
            });

            $('#st-test-draw').on('click', function() {
                var name = GALLERY_ROLE_ORDER[managerIndex] || GALLERY_ROLE_ORDER[0] || '银心';
                var favInfo = getFavorInfo(name);
                var count = Math.max(1, Math.min(5, (getUnlockedImgList(name) || []).length || 3));
                unlockQueue.push({ name: name, mark: favInfo.favor || 0, count: count, files: [], color: getCharColor(name) });
                playUnlockQueue();
            });

            // 新增：颜色选择器改变事件
            $('#st-color-picker').on('change', function() {
                var name = GALLERY_ROLE_ORDER[managerIndex] || CHAR_ORDER[0];
                customColors[name] = $(this).val();
                writeObj(CUSTOM_COLOR_KEY, customColors);
                $('#st-grid .st-img-c').css('--tile-accent', customColors[name]);
                $('#st-favor-hero').css('--hero-accent', customColors[name]);
                refreshScene(true);
            });

            // 新增：重置颜色按钮事件
            $('#st-color-reset').on('click', function() {
                var name = GALLERY_ROLE_ORDER[managerIndex] || CHAR_ORDER[0];
                delete customColors[name];
                writeObj(CUSTOM_COLOR_KEY, customColors);
                var restoredColor = getCharColor(name);
                $('#st-color-picker').val(restoredColor);
                $('#st-grid .st-img-c').css('--tile-accent', restoredColor);
                $('#st-favor-hero').css('--hero-accent', restoredColor);
                refreshScene(true);
            });

            $('#st-unlock-all').on('click', function() { setShown('pwd-m', true); $('#pi').val(''); });
            $('#pwd-cancel').on('click', function() { setShown('pwd-m', false); });
            $('#pwd-confirm').on('click', function() {
                if($('#pi').val() === ACCESS_PASSWORD) {
                    unlocked = true;
                    localStorage.setItem(UNLOCK_KEY, 'true');
                    setShown('pwd-m', false);
                    renderManager();
                } else {
                    $('#pwd-err').text('密码错误');
                }
            });

            $('#scene-tabs').on('click', '.scene-tab', function() {
                var name = $(this).attr('data-name') || '';
                if (!name) return;
                activeSceneTab = name;
                sceneCardsOpen = true;
                lzStatusLog('tab change', name);
                if (pendingUnlock[name]) {
                    delete pendingUnlock[name];
                }
                renderSceneTabs();
                renderSceneStage();
            });

            $('#scene-tab-prev').on('click', function() {
                activateSceneTabByStep(-1);
            });

            $('#scene-tab-next').on('click', function() {
                activateSceneTabByStep(1);
            });

            (function(){
                var tabs = document.getElementById('scene-tabs');
                if (tabs) tabs.addEventListener('scroll', updateSceneTabNavState, { passive: true });
            })();

            $('#scene-tabs').on('touchstart', function(e) {
                var touch = e.originalEvent && e.originalEvent.changedTouches && e.originalEvent.changedTouches[0];
                if (!touch) return;
                sceneTouch.x = touch.clientX;
                sceneTouch.y = touch.clientY;
                sceneTouch.dx = 0;
                sceneTouch.dy = 0;
            });

            $('#scene-tabs').on('touchmove', function(e) {
                var touch = e.originalEvent && e.originalEvent.changedTouches && e.originalEvent.changedTouches[0];
                if (!touch) return;
                sceneTouch.dx = touch.clientX - sceneTouch.x;
                sceneTouch.dy = touch.clientY - sceneTouch.y;
            });

            $('#scene-tabs').on('touchend', function() {
                if (Math.abs(sceneTouch.dx) > 44 && Math.abs(sceneTouch.dx) > Math.abs(sceneTouch.dy)) {
                    activateSceneTabByStep(sceneTouch.dx < 0 ? 1 : -1);
                } else {
                    updateSceneTabNavState();
                }
            });

            (function initThoughtTouch() {
                var SUPPRESS_MS = 520;
                var AUTO_HIDE_MS = 4500;
                var hold = { timer: null, startX: 0, startY: 0, moved: false, fired: false, $wrap: null };
                var HOLD_MS = 460;
                var MOVE_CANCEL_PX = 14;

                function isCoarseTouch() {
                    return window.matchMedia && window.matchMedia('(hover:none), (pointer:coarse)').matches;
                }
                function thoughtPortrait($wrap) {
                    return $wrap.find('.lz-char-portrait, .av-portrait-shell').first();
                }
                function hasThought($wrap) {
                    return thoughtPortrait($wrap).find('.av-thought-bubble').length > 0;
                }
                function isThoughtVisible($wrap) {
                    var $portrait = thoughtPortrait($wrap);
                    return $portrait.hasClass('show-thought') || $portrait.hasClass('thought-pinned');
                }
                function clearThought($wrap) {
                    if (!$wrap || !$wrap.length) return;
                    var $portrait = thoughtPortrait($wrap);
                    $portrait.removeClass('show-thought thought-pinned thought-holding');
                    var node = $portrait.get(0);
                    if (node && typeof node.blur === 'function') node.blur();
                    var autoHide = $wrap.data('thought-auto-hide');
                    if (autoHide) clearTimeout(autoHide);
                    $wrap.removeData('lp-active thought-pinned suppress-click tap-dismiss thought-auto-hide');
                }
                function clearAllThoughts() {
                    $('#scene-stage .lz-char-flip-container, #scene-stage .av-flip-wrap').each(function() {
                        var $w = $(this);
                        if ($w.data('thought-pinned') || $w.data('thought-auto-hide') || isThoughtVisible($w)) {
                            clearThought($w);
                        }
                    });
                    resetHold();
                }
                function resetHold() {
                    clearTimeout(hold.timer);
                    hold.timer = null;
                    hold.moved = false;
                    hold.fired = false;
                    hold.$wrap = null;
                }
                function revealThought($wrap) {
                    var $portrait = thoughtPortrait($wrap);
                    $portrait.addClass('show-thought thought-holding');
                    $wrap.data('lp-active', true);
                    hold.fired = true;
                    if (navigator.vibrate) {
                        try { navigator.vibrate(10); } catch (err) {}
                    }
                }
                function pinThought($wrap) {
                    var $portrait = thoughtPortrait($wrap);
                    $portrait.removeClass('thought-holding').addClass('show-thought');
                    $wrap.removeData('lp-active');

                    if (isCoarseTouch()) {
                        var prev = $wrap.data('thought-auto-hide');
                        if (prev) clearTimeout(prev);
                        $wrap.data('thought-auto-hide', setTimeout(function() {
                            clearThought($wrap);
                        }, AUTO_HIDE_MS));
                        return;
                    }

                    $portrait.addClass('thought-pinned');
                    $wrap.data('thought-pinned', true);
                    $wrap.data('suppress-click', true);
                    setTimeout(function() {
                        $wrap.removeData('suppress-click');
                    }, SUPPRESS_MS);
                }

                window.__mnxClearThoughtPin = clearThought;
                window.__mnxClearAllThoughtPins = clearAllThoughts;

                $('#scene-stage')
                    .on('touchstart.mnxThought', '.lz-char-flip-container, .av-flip-wrap', function(e) {
                        var touch = e.originalEvent && e.originalEvent.touches && e.originalEvent.touches[0];
                        if (!touch) return;
                        var $wrap = $(this);
                        if (!hasThought($wrap)) return;

                        if (isThoughtVisible($wrap) && !hold.timer) {
                            $wrap.data('tap-dismiss', true);
                            return;
                        }

                        clearAllThoughts();
                        resetHold();
                        hold.$wrap = $wrap;
                        hold.startX = touch.clientX;
                        hold.startY = touch.clientY;
                        hold.timer = setTimeout(function() {
                            if (hold.moved || hold.$wrap !== $wrap) return;
                            revealThought($wrap);
                        }, HOLD_MS);
                    })
                    .on('touchmove.mnxThought', '.lz-char-flip-container, .av-flip-wrap', function(e) {
                        if (!hold.timer && !hold.fired) return;
                        var touch = e.originalEvent && e.originalEvent.touches && e.originalEvent.touches[0];
                        if (!touch) return;
                        if (Math.abs(touch.clientX - hold.startX) > MOVE_CANCEL_PX || Math.abs(touch.clientY - hold.startY) > MOVE_CANCEL_PX) {
                            hold.moved = true;
                            clearTimeout(hold.timer);
                            hold.timer = null;
                            if (hold.fired && hold.$wrap) {
                                clearThought(hold.$wrap);
                                hold.fired = false;
                            }
                        }
                    })
                    .on('touchend.mnxThought touchcancel.mnxThought', '.lz-char-flip-container, .av-flip-wrap', function() {
                        var $wrap = $(this);
                        clearTimeout(hold.timer);
                        hold.timer = null;

                        if ($wrap.data('tap-dismiss')) {
                            $wrap.removeData('tap-dismiss');
                            clearThought($wrap);
                            $wrap.data('suppress-click', true);
                            setTimeout(function() { $wrap.removeData('suppress-click'); }, SUPPRESS_MS);
                            resetHold();
                            return;
                        }

                        if (hold.fired && hold.$wrap === $wrap) {
                            pinThought($wrap);
                            resetHold();
                            return;
                        }

                        if (hold.$wrap === $wrap) {
                            clearThought($wrap);
                        }
                        resetHold();
                    });

                $(document).on('touchstart.mnxThoughtOutside', function(e) {
                    if ($(e.target).closest('.lz-char-flip-container, .av-flip-wrap').length) return;
                    clearAllThoughts();
                });

                __mnxThoughtTeardown = function() {
                    $('#scene-stage').off('.mnxThought');
                    $(document).off('.mnxThoughtOutside');
                    clearAllThoughts();
                    delete window.__mnxClearThoughtPin;
                    delete window.__mnxClearAllThoughtPins;
                };
            })();

            $('#pv').on('click', function(e) { if (e.target === this) setShown('pv', false); });
            $('#pvb').on('click', function() { setShown('pv', false); });
            $('#st-m, #pwd-m').on('click', function(e) { if (e.target === this) setShown(this.id, false); });
            $(document).on('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeTopImagePreview();
                    setShown('pv', false);
                    setShown('st-m', false);
                    setShown('pwd-m', false);
                }
            });
            $(window).on('resize', scheduleSyncPreviewViewport);
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', scheduleSyncPreviewViewport);
                window.visualViewport.addEventListener('scroll', scheduleSyncPreviewViewport);
            }

            function saveUiPrefs() { writeObj(PREF_KEY, uiPrefs); }
        }

        $(errorCatched(init));
    </script>
</body>
</html>
