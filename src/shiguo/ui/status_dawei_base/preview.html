    }

      letter-spacing: .12em;
      color: #b89465;
      padding: 2px 0;
      min-width: 2.8em;
    }
    .preview-bar-label.tab { color: #6a8caf; }

      margin: 0 12px 0 0;
      font-size: 14px;
      font-weight: 700;
      color: #b89465;
    }
    .preview-bar p {
      margin: 0;
      font-size: 12px;
      color: #a1a1aa;
      flex: 1 1 280px;
    }
    .preview-bar button {
      border: 1px solid rgba(184,148,101,.35);
      background: rgba(184,148,101,.12);
      color: #f0e6d8;
      border-radius: 8px;
      padding: 6px 11px;
      font-size: 12px;
      cursor: pointer;
    }
    .preview-bar button.on {
      background: #b89465;
      color: #1a1410;
      border-color: #b89465;
    }
    .preview-bar button.tab-btn {
      border-color: rgba(106,140,175,.4);
      background: rgba(106,140,175,.12);
    }
    .preview-bar button.tab-btn.on {
      background: #6a8caf;
      color: #0f1418;
    }
    .preview-bar button.viewport-btn {
      border-color: rgba(120, 168, 120, .4);

    .preview-bar button.viewport-btn.on {

      padding: 12px 16px 16px;

      flex-direction: column;
      width: 100%;
      min-height: 0;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0, 0, 0, .45);

    var currentScene = queryScene || sessionStorage.getItem(SCENE_KEY) || 'sendopts';
    if (!SCENES[currentScene]) currentScene = 'sendopts';
    var currentTab = queryTab || sessionStorage.getItem(TAB_KEY) || 'fengxin';
    if (!['tianji', 'fengxin', 'fengwen', 'lishi', 'fangming', 'fende'].includes(currentTab)) currentTab = 'fengxin';
    var frame = document.getElementById('frame');

    function markPreviewBarActive() {
      if (previewStage) previewStage.setAttribute('data-tab', currentTab);
      document.querySelectorAll('.scene').forEach(function (btn) {
        btn.classList.toggle('on', btn.getAttribute('data-scene') === currentScene);
      });
      document.querySelectorAll('.tab-btn').forEach(function (btn) {
        btn.classList.toggle('on', btn.getAttribute('data-tab') === currentTab);
      });
      document.querySelectorAll('.viewport-btn').forEach(function (btn) {
        btn.classList.toggle('on', btn.getAttribute('data-viewport') === currentViewport);
      });
    }

    function updateViewportHint() {
      if (!viewportHint || !frameWrap) return;
      var preset = VIEWPORTS[currentViewport] || VIEWPORTS.desktop;
      var rect = frameWrap.getBoundingClientRect();
      var width = Math.round(rect.width);
      var height = Math.round(rect.height);
      viewportHint.textContent = preset.label + ' · 实际 ' + width + '×' + height;
    }


    function applyViewport(save) {
      if (!VIEWPORTS[currentViewport]) currentViewport = 'desktop';
      if (previewStage) previewStage.setAttribute('data-viewport', currentViewport);
      if (save) sessionStorage.setItem(VIEWPORT_KEY, currentViewport);
      markPreviewBarActive();
      requestAnimationFrame(updateViewportHint);
    }

    function injectPreviewStat(reset) {
      var stat = buildStat(currentScene);
      var json = JSON.stringify(stat);
      sessionStorage.setItem(PREVIEW_KEY, json);
      sessionStorage.setItem(TAB_KEY, currentTab);
      sessionStorage.setItem(SCENE_KEY, currentScene);
      sessionStorage.setItem('__dwf_preview_user_name__', '仲明');
      try {
        var w = frame.contentWindow;
        if (!w) return false;
        if (reset) {
          w.__DWF_PREVIEW_STAT__ = stat;
          w.sessionStorage.setItem(PREVIEW_KEY, json);
          w.sessionStorage.setItem(TAB_KEY, currentTab);
          w.sessionStorage.setItem('__dwf_preview_user_name__', '仲明');
        }
        if (w.DwfMvu) {
          if (reset && w.DwfMvu.invalidateMvuReadCaches) w.DwfMvu.invalidateMvuReadCaches();
          if (w.DwfMvu.switchMainPanel) {
            var live = w.DwfMvu.getStatData ? w.DwfMvu.getStatData() : stat;
            w.DwfMvu.switchMainPanel(currentTab, reset ? stat : live);
            return true;
          }
        }
      } catch (e) {
        console.error('[preview] 注入测试数据失败', e);
      }
      return false;
    }

    function tryBootPreviewUi() {
      return injectPreviewStat(false);
    }

    function buildStat(sceneKey) {
      var scene = SCENES[sceneKey] || SCENES.tags;
      var stat = JSON.parse(JSON.stringify(BASE));
      Object.keys(scene).forEach(function (k) {
        if (k === '风闻录' && scene[k]) {
          stat[k] = Object.assign({}, stat[k] || {}, scene[k]);
          if (scene[k].机宜) {
            stat[k].机宜 = Object.assign({}, stat[k].机宜 || {}, scene[k].机宜);
            stat[k].机宜.津渡 = Object.assign({}, (stat[k].机宜 || {}).津渡, (scene[k].机宜 || {}).津渡 || {});
            stat[k].机宜.支汊 = Object.assign({}, (stat[k].机宜 || {}).支汊, (scene[k].机宜 || {}).支汊 || {});
          }
        } else if (k === '任务录' && scene[k]) {
          stat[k] = Object.assign({}, stat[k] || {}, scene[k]);
        } else if (k === '房名次' && scene[k]) {
          stat[k] = Object.assign({}, stat[k] || {}, scene[k]);
        } else if (k === '子嗣' && scene[k]) {
          stat[k] = Object.assign({}, stat[k] || {}, scene[k]);
        } else if (k === '履历' && scene[k]) {
          stat[k] = Object.assign({}, stat[k] || {}, scene[k]);
        } else {
          stat[k] = scene[k];
        }
      });
      return stat;
    }

    function persistAndReload() {
      sessionStorage.setItem(SCENE_KEY, currentScene);
      sessionStorage.setItem(TAB_KEY, currentTab);
      sessionStorage.setItem(PREVIEW_KEY, JSON.stringify(buildStat(currentScene)));
      sessionStorage.setItem('__dwf_preview_user_name__', '仲明');
      markPreviewBarActive();
      frame.src = 'index.html?dwf_preview=1&embed=1&_=' + Date.now();
    }

    markPreviewBarActive();
    applyViewport(false);
    sessionStorage.setItem(SCENE_KEY, currentScene);
    sessionStorage.setItem(PREVIEW_KEY, JSON.stringify(buildStat(currentScene)));
    sessionStorage.setItem(TAB_KEY, currentTab);
    sessionStorage.setItem('__dwf_preview_user_name__', '仲明');
    frame.src = 'index.html?dwf_preview=1&embed=1&_=' + Date.now();

    frame.addEventListener('load', function () {
      injectPreviewStat(true);
      requestAnimationFrame(updateViewportHint);
      var tries = 0;
      var bootTimer = setInterval(function () {
        var booted = tryBootPreviewUi();
        updateViewportHint();
        if (booted || ++tries >= 20) clearInterval(bootTimer);
      }, 100);
      try {
        var w = frame.contentWindow;
        if (!w || !w.DwfMvu) {
          console.warn('[preview] iframe 未加载 DwfMvu，请运行：node scripts/compose_dwf_status.mjs');
        }
      } catch (e) {
        console.error('[preview] iframe 访问失败', e);
      }
    });

    document.querySelectorAll('.scene').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.scene').forEach(function (b) { b.classList.remove('on'); });
        btn.classList.add('on');
        currentScene = btn.getAttribute('data-scene');
        persistAndReload();
      });
    });

    document.querySelectorAll('.tab-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('on'); });
        btn.classList.add('on');
        currentTab = btn.getAttribute('data-tab');
        persistAndReload();
      });
    });

    document.querySelectorAll('.viewport-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        currentViewport = btn.getAttribute('data-viewport') || 'desktop';
        applyViewport(true);
      });
    });

    window.addEventListener('resize', function () {
      requestAnimationFrame(updateViewportHint);
    });
    if (window.ResizeObserver && frameWrap) {
      new ResizeObserver(function () {
        updateViewportHint();
      }).observe(frameWrap);
    }
